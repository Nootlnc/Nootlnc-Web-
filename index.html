<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nootlnc | Official Dashboard</title>
    <style>
        :root {
            --gold: #FFD700;
            --dark-bg: #0d1117;
            --sidebar-bg: #161b22;
            --card-bg: #21262d;
            --text-main: #c9d1d9;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--dark-bg);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid #30363d;
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: fixed;
            height: 100vh;
            z-index: 100;
            transition: transform var(--transition);
        }

        .sidebar h2 {
            color: var(--gold);
            font-size: 1.5rem;
            text-align: center;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        .nav-link {
            color: var(--text-main);
            text-decoration: none;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-link:hover {
            background: var(--card-bg);
            color: var(--gold);
            padding-left: 25px;
        }

        /* --- CONTEÚDO PRINCIPAL --- */
        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 40px;
            transition: margin-left var(--transition);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .badge-aura {
            background: linear-gradient(45deg, #b8860b, var(--gold));
            color: black;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.8rem;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        /* --- GRID DE REPOSITÓRIOS --- */
        #repo-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .repo-card {
            background-color: var(--card-bg);
            border: 1px solid #30363d;
            padding: 20px;
            border-radius: 12px;
            text-decoration: none;
            color: inherit;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .repo-card:hover {
            border-color: var(--gold);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .repo-name {
            color: var(--gold);
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        /* --- RESPONSIVIDADE --- */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%); /* Esconde a barra no mobile */
            }
            .main-content {
                margin-left: 0;
                padding: 20px;
            }
            .header-top h1 { font-size: 1.5rem; }
            
            /* Botão para mostrar que a barra existe (opcional no mobile) */
            .sidebar.active {
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h2>NOOTLNC</h2>
        <nav>
            <a href="https://github.com/Nootlnc" class="nav-link" target="_blank">🏠 Home GitHub</a>
            <a href="#" class="nav-link">📦 Repositórios</a>
            <a href="#" class="nav-link">🛠️ Kexts (Beta)</a>
            <a href="#" class="nav-link">👨‍💻 Perfil Nootlnc</a>
            <a href="#" class="nav-link">😎Aura Game 
        </nav>
        <div style="margin-top: auto; font-size: 0.7rem; opacity: 0.5; text-align: center;">
            © 2026 Nootlnc Inc.
        </div>
    </aside>

    <main class="main-content">
        <header class="header-top">
            <h1>Painel de Controle</h1>
            <div class="badge-aura">AURA: INFINITE</div>
        </header>

        <div id="repo-container">
            <p>Sincronizando com os servidores do Nootlnc...</p>
        </div>
    </main>

    <script>
        async function fetchNootRepos() {
            const container = document.getElementById('repo-container');
            try {
                const response = await fetch('https://api.github.com/users/Nootlnc/repos');
                const repos = await response.json();
                
                container.innerHTML = '';

                if (!repos.length) {
                    container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 50px;">
                        <h3 style="color: var(--gold)">Nenhum tesouro encontrado ainda...</h3>
                        <p>O Nootlnc está compilando o código ouro.</p>
                    </div>`;
                    return;
                }

                repos.forEach(repo => {
                    container.innerHTML += `
                        <a href="${repo.html_url}" target="_blank" class="repo-card">
                            <div>
                                <div class="repo-name">📂 ${repo.name}</div>
                                <p style="font-size: 0.85rem; opacity: 0.8;">${repo.description || 'Tecnologia confidencial Nootlnc.'}</p>
                            </div>
                            <div style="margin-top: 15px; display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--gold);">
                                <span>⭐ ${repo.stargazers_count}</span>
                                <span>🍴 ${repo.forks_count}</span>
                                <span>${repo.language || 'Code'}</span>
                            </div>
                        </a>
                    `;
                });
            } catch (e) {
                container.innerHTML = '<p>Erro na conexão com a API. Verifique sua Aura.</p>';
            }
        }
        fetchNootRepos();
    </script>
</body>
</html>
